# SHEED Chat E2E Test
# Tests the chat/messaging functionality

appId: com.sheed.app

---
# Chat Flow

# Navigate to Chats tab
- tapOn:
    text: ".*Chats.*|.*Messages.*|.*💬.*"
    optional: true

# Wait for chats list to load
- assertVisible:
    text: ".*"
  timeout: 3000

# If no chats, show empty state
- assertVisible:
    text: ".*conversation.*|.*message.*|.*chat.*|.*aucun.*"
    optional: true

# Tap on a chat (if exists)
- tapOn:
    index: 0
    optional: true

# Conversation screen should load
- assertVisible:
    text: ".*"
  timeout: 3000

# Message input should be visible
- assertVisible:
    text: ".*message.*|.*Écrire.*|.*Type.*"
    optional: true

# Input a test message
- tapOn:
    text: ".*message.*|.*Écrire.*"
    optional: true

- inputText: "Hello! 👋"

# Send button should appear
- assertVisible:
    text: ".*Envoyer.*|.*Send.*|.*→.*"
    optional: true

# Tap send
- tapOn:
    text: ".*Envoyer.*|.*Send.*|.*→.*"
    optional: true

# Message should appear in list
- assertVisible:
    text: "Hello!"
  timeout: 3000

# Back button should work
- tapOn:
    text: ".*←.*|.*Retour.*|.*Back.*"
    optional: true

# Should return to chats list
- assertVisible:
    text: ".*Chats.*|.*Messages.*"
  timeout: 3000
